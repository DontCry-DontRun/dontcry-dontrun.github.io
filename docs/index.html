<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Don't</title>
<style>
  :root{
    --bg: #14110f;
    --panel: #1d1916;
    --panel-2: #262019;
    --line: #3a3128;
    --ember: #c5703a;
    --ember-bright: #e8915a;
    --bone: #e9e2d4;
    --bone-dim: #a89c87;
    --night: #4a5d7a;
    --night-bright: #6f8bb5;
    --minus: #a8453f;
    --minus-bright: #c2615a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background: radial-gradient(ellipse at top, #1a1612 0%, var(--bg) 60%);
    color: var(--bone);
    font-family: 'Georgia', 'Times New Roman', serif;
    min-height:100vh;
    padding: 28px 16px 60px;
  }
  .wrap{max-width: 880px; margin: 0 auto;}
  header{text-align:center; margin-bottom: 28px;}
  header .crow{font-size: 28px; letter-spacing: 6px; color: var(--ember-bright); opacity:0.85;}
  h1{font-size: 28px; margin: 6px 0 2px; letter-spacing: 1px; font-weight: 400; color: var(--bone);}
  header p{color: var(--bone-dim); font-size: 13px; margin:0; font-family: Arial, sans-serif; letter-spacing: 0.5px;}

  .card{background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 20px 22px; margin-bottom: 18px;}
  .card-head{display:flex; align-items:center; justify-content:space-between; margin-bottom: 14px; flex-wrap:wrap; gap:8px;}
  .card h2{font-size: 14px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--ember-bright); margin: 0; font-family: Arial, sans-serif; font-weight: 600;}
  .card .hint{font-family: Arial, sans-serif; font-size: 12px; color: var(--bone-dim); margin: -8px 0 14px;}

  select, input{background: var(--panel-2); border: 1px solid var(--line); color: var(--bone); padding: 10px 12px; border-radius: 6px; font-size: 15px; font-family: Arial, sans-serif;}
  select{width: 100%; cursor:pointer;}
  select:focus, input:focus{outline: 2px solid var(--ember); outline-offset:1px;}

  .toggle{display:flex; border: 1px solid var(--line); border-radius: 8px; overflow:hidden; width:fit-content;}
  .toggle.spaced{margin-bottom: 14px;}
  .toggle button{border:none; background: var(--panel-2); color: var(--bone-dim); padding: 9px 18px; font-family: Arial, sans-serif; font-size: 13px; cursor:pointer; letter-spacing: 0.5px;}
  .toggle button.active.day{background: var(--ember); color:#1a1410;}
  .toggle button.active.night{background: var(--night-bright); color:#1a1410;}
  .toggle button.active.plus{background: var(--ember); color:#1a1410;}
  .toggle button.active.minus{background: var(--minus); color:#1a1410;}

  .activities{display:grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px;}
  .act-btn{background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; padding: 14px 10px; text-align:center; cursor:pointer; transition: transform 0.12s, border-color 0.12s, background 0.12s; font-family: Arial, sans-serif;}
  .act-btn:hover{border-color: var(--ember); transform: translateY(-2px);}
  .act-btn:active{transform: translateY(0px) scale(0.98);}
  .act-btn.minus-active:hover{border-color: var(--minus);}
  .act-btn .name{font-size: 14px; color: var(--bone); display:block; margin-bottom:6px;}
  .act-btn .coef{font-size: 12px; color: var(--ember-bright); font-weight:600;}
  .act-btn.night .coef{color: var(--night-bright);}
  .act-btn.minus-active .coef{color: var(--minus-bright);}

  .pick-toolbar{display:flex; align-items:center; gap:10px; margin-bottom: 10px; flex-wrap:wrap;}
  .pick-toolbar input{flex:2; min-width:140px; padding: 8px 10px; font-size: 13px;}
  .pick-toolbar select{flex:1; min-width:110px; padding: 8px 10px; font-size: 13px;}
  .pick-count{font-family: Arial, sans-serif; font-size: 12px; color: var(--bone-dim); white-space:nowrap;}

  .class-dot{display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:7px; flex-shrink:0;}
  .squad-chip{display:inline-block; font-family: Arial, sans-serif; font-size:10.5px; font-weight:700; color: var(--bone-dim); border: 1px solid var(--line); border-radius: 4px; padding: 1px 5px; margin-left:8px;}

  .people-pick{display:grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 5px; max-height: 320px; overflow-y: auto; padding-right: 4px;}
  .pick-row{display:flex; align-items:center; gap:4px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 6px; padding: 6px 9px; cursor:pointer; font-family: Arial, sans-serif; user-select:none;}
  .pick-row.selected{border-color: var(--ember); background: #2a2118;}
  .pick-row input[type=checkbox]{width:13px; height:13px; accent-color: var(--ember); cursor:pointer; flex-shrink:0;}
  .pick-row .pname{font-size:12.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

  .people{display:flex; flex-direction:column; gap:8px;}
  .person{display:flex; align-items:center; justify-content:space-between; background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; padding: 10px 14px; font-family: Arial, sans-serif; flex-wrap:wrap; gap:8px;}
  .person .pname-wrap{display:flex; align-items:center; flex-wrap:wrap;}
  .person .pname{font-size: 15px;}
  .person .pclass{font-size: 11px; color: var(--bone-dim); margin-left: 9px;}
  .person .pscore{font-size: 17px; font-weight:700; color: var(--ember-bright); min-width: 50px; text-align:right;}
  .score-wrap{display:flex; flex-direction:column; align-items:flex-end; line-height:1.2;}
  .pscore-sub{font-size: 10.5px; color: var(--bone-dim); white-space:nowrap;}
  .person input.coef-edit{padding:5px 7px; font-size:12px; width:60px;}
  .person .controls{display:flex; align-items:center; gap:8px;}
  .person select.class-edit, .person select.squad-edit{padding:5px 7px; font-size:12px; width:auto;}
  .person input.name-edit{padding:5px 7px; font-size:13px; width:110px;}
  .person button.rm{background:none; border:none; color: var(--bone-dim); cursor:pointer; font-size:16px; padding:2px 6px; line-height:1;}
  .person button.rm:hover{color:#c97b6a;}

  .add-row{display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;}
  .add-row input{flex:2; min-width:140px;}
  .add-row select{flex:1; min-width:120px;}
  .btn{background: var(--ember); color: #1a1410; border:none; padding: 10px 16px; border-radius: 6px; cursor:pointer; font-family: Arial, sans-serif; font-weight:600; font-size: 13px; letter-spacing: 0.3px;}
  .btn:hover{background: var(--ember-bright);}
  .btn.ghost{background: transparent; border: 1px solid var(--line); color: var(--bone-dim);}
  .btn.ghost:hover{border-color:#a85a4a; color:#c97b6a;}
  .btn.ghost.on{border-color: var(--ember); color: var(--ember-bright);}
  .btn.small{padding: 7px 12px; font-size: 12px;}

  .footer-row{display:flex; justify-content:flex-end; align-items:center; margin-top: 4px; font-family: Arial, sans-serif; flex-wrap:wrap; gap:10px;}

  .menu-wrap{position:relative;}
  .icon-btn{font-size:16px; padding: 5px 10px; line-height:1;}
  .dropdown-menu{
    display:none;
    position:absolute;
    top: calc(100% + 6px);
    right:0;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    min-width: 220px;
    z-index: 30;
    overflow:hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  }
  .dropdown-menu.open{display:block;}
  .dropdown-menu button{
    display:block;
    width:100%;
    text-align:left;
    background:none;
    border:none;
    color: var(--bone);
    padding: 11px 14px;
    font-family: Arial, sans-serif;
    font-size: 13px;
    cursor:pointer;
  }
  .dropdown-menu button:hover{background: var(--panel);}
  .dropdown-menu button + button{border-top: 1px solid var(--line);}
  .dropdown-menu button.danger{color: var(--minus-bright);}

  .legend{display:flex; flex-wrap:wrap; gap: 10px 16px; margin-bottom: 14px; font-family: Arial, sans-serif; font-size: 11.5px; color: var(--bone-dim);}
  .legend span{display:flex; align-items:center;}

  .history{display:flex; flex-direction:column; gap:6px; max-height: 360px; overflow-y:auto; font-family: Arial, sans-serif;}
  .history-row{display:flex; justify-content:space-between; gap:10px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 6px; padding: 8px 12px; font-size: 12.5px;}
  .history-row .h-main{color: var(--bone);}
  .history-row .h-time{color: var(--bone-dim); font-size: 11px; white-space:nowrap;}
  .history-row .h-coef{font-weight:700; white-space:nowrap;}
  .history-row .h-coef.pos{color: var(--ember-bright);}
  .history-row .h-coef.neg{color: var(--minus-bright);}

  .toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(20px); background: var(--panel); border:1px solid var(--ember); color: var(--bone); padding: 10px 18px; border-radius:8px; font-family:Arial,sans-serif; font-size:13px; opacity:0; transition: opacity 0.25s, transform 0.25s; pointer-events:none; z-index:50; max-width: 90vw; width: max-content; text-align:center;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .empty{color: var(--bone-dim); font-size:13px; font-family:Arial,sans-serif; text-align:center; padding: 16px 0;}
  .loading{text-align:center; color:var(--bone-dim); font-family:Arial,sans-serif; padding:40px;}

  .modal-overlay{
    display:none;
    position:fixed; inset:0;
    background: rgba(10,8,6,0.72);
    align-items:center; justify-content:center;
    z-index: 100;
  }
  .modal-overlay.open{display:flex;}
  .modal-box{
    background: var(--panel);
    border: 1px solid var(--ember);
    border-radius: 10px;
    padding: 22px 24px;
    width: 90%; max-width: 320px;
    font-family: Arial, sans-serif;
  }
  .modal-box h3{margin:0 0 6px; font-size:16px; color: var(--bone); font-weight:600;}
  .modal-box p{margin:0 0 14px; font-size:12.5px; color: var(--bone-dim);}
  .modal-box input{width:100%; margin-bottom:14px;}
  .modal-row{display:flex; justify-content:flex-end; gap:8px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="crow">⁛ ⁛ ⁛</div>
    <h1>Don't</h1>
  </header>

  <div id="loading" class="loading">Загрузка…</div>

  <div id="app" style="display:none;">

    <div class="card">

      <select id="selMonth" style="margin-top:14px;"></select>
    </div>

    <div class="card">
      <h2>Кому ставим баллы</h2>
      <div class="pick-toolbar">
        <input type="text" id="searchPeople" placeholder="Поиск по нику…">
        <select id="filterSquad">
          <option value="">Все составы</option>
          <option value="I">Состав I</option>
          <option value="II">Состав II</option>
          <option value="III">Состав III</option>

        <span class="pick-count" id="pickCount">Выбрано: 0</span>

    <div class="card">
      <div class="card-head">
        <h2>Список</h2>

          <div class="dropdown-menu" id="dropdownMenu">
            <button id="toggleEdit">Редактировать список</button>

          </div>
        </div>
      </div>
      <div class="legend" id="legend"></div>
      <div class="pick-toolbar">
        <select id="listFilterClass">
          <option value="">Все классы</option>
        </select>
        <select id="listFilterSquad">
          <option value="">Все составы</option>
          <option value="I">Состав I</option>
          <option value="II">Состав II</option>

          <option value="" disabled selected>Класс…</option>

          <option value="I">Состав I</option>

        <button class="btn" id="addPerson">Добавить</button>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <h2>История начислений</h2>

      <div id="historyBox" style="display:none;">

  </div>
</div>

<div class="toast" id="toast"></div>

<script>

<script>
const STORAGE_KEY = 'nevermore-baller-state';
const EDIT_PASSWORD = 'boloto';

let unlocked = false;
let pendingAction = null;

const DAY_ACTIVITIES = [
  { name: 'Денгур', coef: 1 },
  { name: 'Эдвард', coef: 1 },
  { name: 'Пожики', coef: 1 },
  { name: 'Воко', coef: 4 },
  { name: 'Осада', coef: 4 },
  { name: 'Осада 1,5', coef: 6 },
  { name: 'Аркон', coef: 8 },
  { name: 'ПВП 20 мин', coef: 1 },
  { name: '+1 балл', coef: 1 },
];
const NIGHT_ACTIVITIES = [
  { name: 'Денгур', coef: 2 },
  { name: 'Эдвард', coef: 2 },
  { name: 'Пожики', coef: 2 },
  { name: 'Воко', coef: 5 },
];
const MONTH_NAMES = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

const CLASSES = [
  { name: 'Крестоносец',    color: '#d9b35c' },
  { name: 'Темный рыцарь',  color: '#7a64a8' },
  { name: 'Волшебник',      color: '#5b8fc9' },
  { name: 'Чернокнижник',   color: '#aa55a8' },
  { name: 'Снайпер',        color: '#5fa777' },
  { name: 'Охотник',        color: '#b07d4a' },
  { name: 'Ассасин',        color: '#c2483f' },
  { name: 'Разбойник',      color: '#6a9c9c' },
];
const NO_CLASS_COLOR = '#5a5248';
const SQUADS = ['I', 'II', 'III'];

function classColor(name){
  const c = CLASSES.find(c => c.name === name);
  return c ? c.color : NO_CLASS_COLOR;
}

let state = { people: [], history: [] };
let mode = 'day';
let sign = 1;
let selectedMonth = currentMonthKey();
let selectedPeople = new Set();
let searchQuery = '';
let squadFilter = '';
let listClassFilter = '';
let listSquadFilter = '';
let editMode = false;
let showRaw = false;

function currentMonthKey(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function monthLabel(key){
  const [y,m] = key.split('-');
  return `${MONTH_NAMES[parseInt(m)-1]} ${y}`;
}
function buildMonthOptions(){
  const sel = document.getElementById('selMonth');
  const now = new Date();
  const opts = [];
  for(let i=-6;i<=6;i++){
    const d = new Date(now.getFullYear(), now.getMonth()+i, 1);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    opts.push(key);
  }
  sel.innerHTML = opts.map(k => `<option value="${k}">${monthLabel(k)}</option>`).join('');
  sel.value = selectedMonth;
}
function buildClassOptions(){
  document.getElementById('newClass').innerHTML =
    '<option value="" disabled selected>Класс…</option>' +
    CLASSES.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
  document.getElementById('listFilterClass').innerHTML =
    '<option value="">Все классы</option>' +
    CLASSES.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
}
function buildLegend(){
  document.getElementById('legend').innerHTML = CLASSES.map(c =>
    `<span><span class="class-dot" style="background:${c.color}"></span>${c.name}</span>`
  ).join('');
}

function requireAuth(action){
  if(unlocked){
    action();
    return;
  }
  pendingAction = action;
  document.getElementById('passInput').value = '';
  document.getElementById('passOverlay').classList.add('open');
  setTimeout(() => document.getElementById('passInput').focus(), 50);
}

function closePassModal(){
  document.getElementById('passOverlay').classList.remove('open');
  pendingAction = null;
}

document.getElementById('passSubmit').addEventListener('click', () => {
  const val = document.getElementById('passInput').value;
  if(val === EDIT_PASSWORD){
    unlocked = true;
    const action = pendingAction;
    closePassModal();
    showToast('Доступ к изменениям открыт до перезагрузки страницы');
    if(action) action();
  } else {
    showToast('Неверный пароль');
  }
});
document.getElementById('passCancel').addEventListener('click', closePassModal);
document.getElementById('passInput').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') document.getElementById('passSubmit').click();
  if(e.key === 'Escape') closePassModal();
});
document.getElementById('passOverlay').addEventListener('click', (e) => {
  if(e.target.id === 'passOverlay') closePassModal();
});

function showToast(msg, duration){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), duration || 1700);
}

async function loadState(){
  try{
    const snap = await stateRef.once('value');
    const val = snap.val();
    if(val && val.json){
      state = JSON.parse(val.json);
    } else {
      state = { people: [
        { name: 'Moss', class: 'Темный рыцарь', squad: 'I', scores: {} },
        { name: 'Critical', class: 'Крестоносец', squad: 'I', scores: {} },
        { name: 'Черт', class: 'Темный рыцарь', squad: 'I', scores: {} }
      ], history: [] };
      await saveState();
    }
  }catch(e){
    console.error('Firebase load error:', e);
    showToast('Не удалось загрузить данные из базы — проверь конфиг и правила Firebase');
    state = { people: [
      { name: 'Moss', class: 'Темный рыцарь', squad: 'I', scores: {} },
      { name: 'Critical', class: 'Крестоносец', squad: 'I', scores: {} },
      { name: 'Черт', class: 'Темный рыцарь', squad: 'I', scores: {} }
    ], history: [] };
  }
  if(!state.people) state.people = [];
  if(!state.history) state.history = [];
  state.people.forEach(p => {
    if(!p.scores) p.scores = {};
    if(!p.class) p.class = null;
    if(!p.squad) p.squad = 'I';
    if(p.coef === undefined || p.coef === null || isNaN(parseFloat(p.coef))) p.coef = 1;
  });
}

const STORAGE_LIMIT_BYTES = 8 * 1024 * 1024;
const STORAGE_WARN_BYTES = 6 * 1024 * 1024;

function stateByteSize(){
  return new Blob([JSON.stringify(state)]).size;
}

async function saveState(){
  const size = stateByteSize();
  if(size >= STORAGE_LIMIT_BYTES){
    showToast('Данных стало слишком много — сохранение остановлено. Очисти старую историю.', 5000);
    return false;
  }
  try{
    await stateRef.set({ json: JSON.stringify(state) });
    if(size >= STORAGE_WARN_BYTES){
      showToast(`Объём данных растёт (${(size/1024/1024).toFixed(2)} МБ) — стоит очистить старую историю`, 5000);
    }
    return true;
  }catch(e){
    console.error('Firebase save error:', e);
    showToast('Ошибка сохранения в базу — проверь конфиг Firebase и правила доступа');
    return false;
  }
}

function rawScoreFor(person){
  return person.scores[selectedMonth] || 0;
}
function personCoef(person){
  const c = parseFloat(person.coef);
  return isNaN(c) ? 1 : c;
}
function scoreFor(person){
  return rawScoreFor(person) * personCoef(person);
}
function fmt(n){
  return Number.isInteger(n) ? n : Math.round(n * 100) / 100;
}

function renderActivities(){
  const list = mode === 'day' ? DAY_ACTIVITIES : NIGHT_ACTIVITIES;

  const box = document.getElementById('activities');
  box.innerHTML = '';
  if(list.length === 0){
    box.innerHTML = '<div class="empty">Для этого времени нет активностей</div>';
    return;
  }
  list.forEach(act => {
    const signedCoef = act.coef * sign;
    const btn = document.createElement('div');
    btn.className = 'act-btn' + (mode === 'night' ? ' night' : '') + (sign < 0 ? ' minus-active' : '');
    btn.innerHTML = `<span class="name">${act.name}</span><span class="coef">${signedCoef > 0 ? '+' : ''}${signedCoef}</span>`;
    btn.addEventListener('click', () => requireAuth(() => giveScore(signedCoef, act.name)));
    box.appendChild(btn);
  });
}

function renderPeoplePick(){
  const box = document.getElementById('peoplePick');
  box.innerHTML = '';
  document.getElementById('pickCount').textContent = `Выбрано: ${selectedPeople.size}`;

  if(state.people.length === 0){
    box.innerHTML = '<div class="empty">Список пуст — добавь ник в карточке «Список»</div>';
    return;
  }
  const q = searchQuery.trim().toLowerCase();
  let sorted = [...state.people].sort((a, b) => scoreFor(b) - scoreFor(a));
  if(q) sorted = sorted.filter(p => p.name.toLowerCase().includes(q));
  if(squadFilter) sorted = sorted.filter(p => p.squad === squadFilter);

  if(sorted.length === 0){
    box.innerHTML = '<div class="empty">Никого не нашлось по такому запросу</div>';
    return;
  }
  sorted.forEach(p => {
    const row = document.createElement('div');
    row.className = 'pick-row' + (selectedPeople.has(p.name) ? ' selected' : '');
    row.title = `${p.class || 'Без класса'} · Состав ${p.squad}`;
    row.innerHTML = `<input type="checkbox" ${selectedPeople.has(p.name) ? 'checked' : ''}>
      <span class="class-dot" style="background:${classColor(p.class)}"></span>
      <span class="pname">${p.name}</span>`;
    row.addEventListener('click', (e) => {
      e.preventDefault();
      if(selectedPeople.has(p.name)) selectedPeople.delete(p.name);
      else selectedPeople.add(p.name);
      renderPeoplePick();
    });
    box.appendChild(row);
  });
}

function renderPeopleList(){
  const box = document.getElementById('people');
  box.innerHTML = '';
  if(state.people.length === 0){
    box.innerHTML = '<div class="empty">Список пуст — добавь первый ник ниже</div>';
    return;
  }
  let sorted = [...state.people].sort((a, b) => scoreFor(b) - scoreFor(a));
  if(listClassFilter) sorted = sorted.filter(p => p.class === listClassFilter);
  if(listSquadFilter) sorted = sorted.filter(p => p.squad === listSquadFilter);
  if(sorted.length === 0){
    box.innerHTML = '<div class="empty">Никого не нашлось по такому фильтру</div>';
    return;
  }
  sorted.forEach(p => {
    const row = document.createElement('div');
    row.className = 'person';

    const classOptions = CLASSES.map(c =>
      `<option value="${c.name}" ${p.class === c.name ? 'selected' : ''}>${c.name}</option>`
    ).join('');
    const squadOptions = SQUADS.map(s =>
      `<option value="${s}" ${p.squad === s ? 'selected' : ''}>Состав ${s}</option>`
    ).join('');

    const leftHtml = editMode
      ? `<span class="class-dot" style="background:${classColor(p.class)}"></span>
         <input type="text" class="name-edit" data-name="${p.name}" value="${p.name}">
         <select class="class-edit" data-name="${p.name}">${classOptions}</select>
         <select class="squad-edit" data-name="${p.name}">${squadOptions}</select>
         <input type="number" class="coef-edit" data-name="${p.name}" value="${personCoef(p)}" min="0" step="0.1" title="Коэффициент">`
      : `<span class="class-dot" style="background:${classColor(p.class)}"></span>
         <span class="pname">${p.name}</span>
         <span class="pclass">${p.class || 'без класса'}</span>
         <span class="squad-chip">${p.squad}</span>
         <span class="squad-chip" title="Коэффициент">×${fmt(personCoef(p))}</span>`;

    const raw = rawScoreFor(p);
    const final = scoreFor(p);
    const mainScore = showRaw ? raw : final;
    const subScore = showRaw
      ? `итог: ${fmt(final)}`
      : `без коэф.: ${fmt(raw)}`;

    row.innerHTML = `
      <span class="pname-wrap">${leftHtml}</span>
      <span class="controls">
        <span class="score-wrap">
          <span class="pscore">${fmt(mainScore)}</span>
          <span class="pscore-sub">${subScore}</span>
        </span>
        ${editMode ? `<button class="rm" title="Удалить" data-name="${p.name}">✕</button>` : ''}
      </span>`;
    box.appendChild(row);
  });

  if(editMode){
    box.querySelectorAll('.coef-edit').forEach(input => {
      const commitCoef = async () => {
        const person = state.people.find(p => p.name === input.dataset.name);
        if(!person) return;
        const val = parseFloat(input.value);
        person.coef = isNaN(val) || val < 0 ? 1 : val;
        await saveState();
        renderAll();
      };
      input.addEventListener('blur', commitCoef);
      input.addEventListener('keydown', (e) => { if(e.key === 'Enter') input.blur(); });
    });
    box.querySelectorAll('.name-edit').forEach(input => {
      const commitRename = async () => {
        const oldName = input.dataset.name;
        const newName = input.value.trim();
        if(!newName || newName === oldName) { input.value = oldName; return; }
        if(state.people.some(p => p.name.toLowerCase() === newName.toLowerCase() && p.name !== oldName)){
          showToast('Такой ник уже есть в списке');
          input.value = oldName;
          return;
        }
        const person = state.people.find(p => p.name === oldName);
        if(person){
          person.name = newName;
          if(selectedPeople.has(oldName)){ selectedPeople.delete(oldName); selectedPeople.add(newName); }
          state.history.forEach(h => { h.names = h.names.map(n => n === oldName ? newName : n); });
          await saveState();
          renderAll();
        }
      };
      input.addEventListener('blur', commitRename);
      input.addEventListener('keydown', (e) => { if(e.key === 'Enter') input.blur(); });
    });
    box.querySelectorAll('.class-edit').forEach(sel => {
      sel.addEventListener('change', async () => {
        const person = state.people.find(p => p.name === sel.dataset.name);
        if(person){ person.class = sel.value; await saveState(); renderAll(); }
      });
    });
    box.querySelectorAll('.squad-edit').forEach(sel => {
      sel.addEventListener('change', async () => {
        const person = state.people.find(p => p.name === sel.dataset.name);
        if(person){ person.squad = sel.value; await saveState(); renderAll(); }
      });
    });
    box.querySelectorAll('.rm').forEach(btn => {
      btn.addEventListener('click', async () => {
        const name = btn.dataset.name;
        if(!confirm(`Удалить «${name}» из списка вместе со всей историей баллов?`)) return;
        selectedPeople.delete(name);
        state.people = state.people.filter(p => p.name !== name);
        await saveState();
        renderAll();
      });
    });
  }
}

function renderHistory(){
  const box = document.getElementById('history');
  if(!state.history || state.history.length === 0){
    box.innerHTML = '<div class="empty">Записей пока нет</div>';
    return;
  }
  const items = [...state.history].reverse();
  box.innerHTML = items.map(h => {
    const d = new Date(h.ts);
    const timeStr = d.toLocaleString('ru-RU', { day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit' });
    const coefClass = h.coef >= 0 ? 'pos' : 'neg';
    const coefStr = (h.coef > 0 ? '+' : '') + h.coef;
    return `<div class="history-row">
        <span class="h-main">${h.names.join(', ')} — ${h.activity} <span style="color:var(--bone-dim)">(${monthLabel(h.month)})</span></span>
        <span style="display:flex; align-items:center; gap:10px;">
          <span class="h-coef ${coefClass}">${coefStr}</span>
          <span class="h-time">${timeStr}</span>
        </span>
      </div>`;
  }).join('');
}

function renderAll(){
  renderPeoplePick();
  renderPeopleList();
  renderActivities();
  renderHistory();
}

async function giveScore(coef, actName){
  if(selectedPeople.size === 0){
    showToast('Сначала отметь хотя бы один ник');
    return;
  }
  const names = [...selectedPeople];
  names.forEach(name => {
    const person = state.people.find(p => p.name === name);
    if(person) person.scores[selectedMonth] = (person.scores[selectedMonth] || 0) + coef;
  });
  state.history.push({ ts: Date.now(), month: selectedMonth, names, activity: actName, coef });
  await saveState();
  renderAll();
  showToast(`${coef > 0 ? '+' : ''}${coef} (${actName}) — ${names.join(', ')}`);
}

document.getElementById('selMonth').addEventListener('change', (e) => {
  selectedMonth = e.target.value;
  renderAll();
});

document.getElementById('searchPeople').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  renderPeoplePick();
});

document.getElementById('filterSquad').addEventListener('change', (e) => {
  squadFilter = e.target.value;
  renderPeoplePick();
});

document.getElementById('clearSelection').addEventListener('click', () => {
  if(selectedPeople.size === 0) return;
  selectedPeople.clear();
  renderPeoplePick();
  showToast('Выбор сброшен');
});

document.querySelectorAll('.toggle button[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    mode = btn.dataset.mode;
    document.querySelectorAll('.toggle button[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderActivities();
  });
});

document.querySelectorAll('.toggle button[data-sign]').forEach(btn => {
  btn.addEventListener('click', () => {
    sign = parseInt(btn.dataset.sign);
    document.querySelectorAll('.toggle button[data-sign]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderActivities();
  });
});

document.getElementById('listFilterClass').addEventListener('change', (e) => {
  listClassFilter = e.target.value;
  renderPeopleList();
});

document.getElementById('listFilterSquad').addEventListener('change', (e) => {
  listSquadFilter = e.target.value;
  renderPeopleList();
});

document.getElementById('toggleRaw').addEventListener('click', () => {
  showRaw = !showRaw;
  const btn = document.getElementById('toggleRaw');
  btn.textContent = showRaw ? 'Показать с коэффициентом' : 'Без коэффициента';
  btn.classList.toggle('on', showRaw);
  renderPeopleList();
});

document.getElementById('menuToggle').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('dropdownMenu').classList.toggle('open');
});
document.addEventListener('click', () => {
  document.getElementById('dropdownMenu').classList.remove('open');
});
document.getElementById('dropdownMenu').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('dropdownMenu').classList.remove('open');
});

document.getElementById('toggleEdit').addEventListener('click', () => {
  if(!editMode){
    requireAuth(() => {
      editMode = true;
      const btn = document.getElementById('toggleEdit');
      btn.textContent = 'Готово';
      btn.classList.add('on');
      renderPeopleList();
    });
    return;
  }
  editMode = false;
  const btn = document.getElementById('toggleEdit');
  btn.textContent = 'Редактировать список';
  btn.classList.remove('on');
  renderPeopleList();
});

document.getElementById('toggleHistory').addEventListener('click', () => {
  const box = document.getElementById('historyBox');
  const btn = document.getElementById('toggleHistory');
  const shown = box.style.display !== 'none';
  box.style.display = shown ? 'none' : 'block';
  btn.textContent = shown ? 'Показать историю' : 'Скрыть историю';
  btn.classList.toggle('on', !shown);
  if(!shown) renderHistory();
});

document.getElementById('addPerson').addEventListener('click', () => requireAuth(async () => {
  const input = document.getElementById('newName');
  const classSel = document.getElementById('newClass');
  const squadSel = document.getElementById('newSquad');
  const coefInput = document.getElementById('newCoef');
  const name = input.value.trim();
  const cls = classSel.value;
  const squad = squadSel.value;
  const coefVal = parseFloat(coefInput.value);
  const coef = isNaN(coefVal) || coefVal < 0 ? 1 : coefVal;
  if(!name) return;
  if(!cls){
    showToast('Выбери класс персонажа');
    return;
  }
  if(state.people.some(p => p.name.toLowerCase() === name.toLowerCase())){
    showToast('Такой ник уже есть в списке');
    return;
  }
  state.people.push({ name, class: cls, squad, coef, scores: {} });
  input.value = '';
  classSel.value = '';
  squadSel.value = 'I';
  coefInput.value = '1';
  await saveState();
  renderAll();
}));
document.getElementById('newName').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') document.getElementById('addPerson').click();
});

function activityBaseName(name){
  return name.replace(/ x2$/, '');
}

function breakdownFor(personName){
  const totals = {};
  DAY_ACTIVITIES.forEach(a => totals[a.name] = 0);
  state.history.forEach(h => {
    if(h.month !== selectedMonth) return;
    if(!h.names.includes(personName)) return;
    const base = activityBaseName(h.activity);
    if(totals.hasOwnProperty(base)) totals[base] += h.coef;
  });
  return totals;
}

document.getElementById('exportCsv').addEventListener('click', () => {
  const sorted = [...state.people].sort((a, b) => scoreFor(b) - scoreFor(a));
  const activityNames = DAY_ACTIVITIES.map(a => a.name);
  const header = ['Ник', 'Класс', 'Состав', 'Коэффициент', 'Баллы без коэф.', 'Баллы итого', ...activityNames];
  const rows = [header, ...sorted.map(p => {
    const bd = breakdownFor(p.name);
    return [p.name, p.class || 'без класса', p.squad, fmt(personCoef(p)), fmt(rawScoreFor(p)), fmt(scoreFor(p)), ...activityNames.map(n => fmt(bd[n]))];
  })];
  const csv = '\uFEFF' + rows.map(r => r.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(';')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `dont-balls-${selectedMonth}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(`Файл за ${monthLabel(selectedMonth)} выгружен`);
});

document.getElementById('trimHistory').addEventListener('click', () => requireAuth(async () => {
  const cutoffMonths = 6;
  const now = new Date();
  const cutoff = new Date(now.getFullYear(), now.getMonth() - cutoffMonths, 1);
  const kept = state.history.filter(h => {
    const [y, m] = h.month.split('-').map(Number);
    const d = new Date(y, m - 1, 1);
    return d >= cutoff;
  });
  const removed = state.history.length - kept.length;
  if(removed === 0){
    showToast('Старых записей не нашлось — чистить нечего');
    return;
  }
  if(!confirm(`Удалить ${removed} записей истории старше ${cutoffMonths} месяцев? Сами баллы не изменятся, удалится только детальный лог по активностям.`)){
    return;
  }
  state.history = kept;
  await saveState();
  renderAll();
  showToast(`Удалено записей: ${removed}. Баллы не затронуты.`);
}));

document.getElementById('clearAll').addEventListener('click', () => requireAuth(async () => {
  if(!confirm(`Сбросить баллы за ${monthLabel(selectedMonth)} всем в списке?`)) return;
  state.people.forEach(p => { p.scores[selectedMonth] = 0; });
  await saveState();
  renderAll();
  showToast('Баллы за месяц сброшены');
}));

(async function init(){
  await loadState();
  buildMonthOptions();
  buildClassOptions();
  buildLegend();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  renderAll();
})();
</script>
</body>
</html>
